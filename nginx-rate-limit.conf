# 限流 zone 定义（由 conf.d 引入，位于 http 上下文）
# 若前置反向代理，请确保传入 X-Forwarded-For 或 X-Real-IP

# 解析真实客户端 IP（优先 X-Real-IP，其次 X-Forwarded-For 首段）
map $http_x_real_ip $client_ip {
    ""      $remote_addr;
    default $http_x_real_ip;
}

map $http_x_forwarded_for $client_ip_from_xff {
    ""                    $client_ip;
    ~^(?<first_ip>[^,\s]+) $first_ip;
    default               $client_ip;
}

# 页面请求：正常浏览足够，可抵御高频扫描
limit_req_zone $client_ip_from_xff zone=page_limit:10m rate=10r/s;

# 静态资源：允许浏览器并行加载，阈值高于页面
limit_req_zone $client_ip_from_xff zone=static_limit:10m rate=50r/s;

# 搜索索引 / RSS 等：响应体较大，限制更严以防爬取滥用
limit_req_zone $client_ip_from_xff zone=heavy_limit:10m rate=2r/s;

# 单 IP 并发连接上限，缓解连接耗尽类攻击
limit_conn_zone $client_ip_from_xff zone=conn_limit:10m;
