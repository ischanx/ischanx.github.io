server {
    listen       80;
    server_name  localhost;

    # 设置根目录
    root   /usr/share/nginx/html;
    index  index.html;

    # ── 限流（全局）────────────────────────────────────────────────
    limit_conn conn_limit 30;

    limit_req_status 429;
    limit_conn_status 429;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── 缓存策略（由强到弱匹配）────────────────────────────────────

    # 构建产物（文件名含 content hash）— 可永久缓存
    location ^~ /_astro/ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 公共静态图片（文件名无 hash，更新后需重新拉取）
    location ^~ /img/ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    # 字体
    location ~* \.(woff2?|ttf|eot|otf)$ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # 矢量图 / 现代图片格式 / favicon
    location ~* \.(svg|webp|avif|ico)$ {
        limit_req zone=static_limit burst=200 nodelay;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # RSS / Atom / 搜索索引
    location ~* ^/(rss2?\.xml|atom\.xml|search-index\.json)$ {
        limit_req zone=heavy_limit burst=10 nodelay;

        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Sitemap
    location ~* ^/sitemap {
        limit_req zone=heavy_limit burst=10 nodelay;

        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # robots.txt
    location = /robots.txt {
        limit_req zone=page_limit burst=30 nodelay;

        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── 路由规则 ────────────────────────────────────────────────────

    # 根路径直接返回首页，避免 index 模块内部跳转到 /index.html 后被去后缀规则重定向到 /index
    location = / {
        limit_req zone=page_limit burst=30 nodelay;

        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # 规范化首页相关路径
    location = /index {
        limit_req zone=page_limit burst=30 nodelay;

        return 301 /;
    }

    location = /index.html {
        limit_req zone=page_limit burst=30 nodelay;

        return 301 /;
    }

    # 重定向 .html 后缀到无后缀 URL（首页已在上方单独处理）
    location ~ ^(/.+)\.html$ {
        limit_req zone=page_limit burst=30 nodelay;

        return 301 $1;
    }

    # 直接访问 .html 文件时禁止缓存
    location ~* \.html$ {
        limit_req zone=page_limit burst=30 nodelay;

        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # 处理没有后缀的 URL，自动匹配 .html
    location / {
        limit_req zone=page_limit burst=30 nodelay;

        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # 错误页面配置
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        limit_req zone=page_limit burst=30 nodelay;

        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
